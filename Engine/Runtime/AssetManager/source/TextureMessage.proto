syntax = "proto3";
import "Common.proto";

// ==================== 采样器 ====================
message SamplerMessage
{
    enum FilterMode
    {
        NEAREST = 0;
        LINEAR = 1;
        NEAREST_MIPMAP_NEAREST = 2;
        NEAREST_MIPMAP_LINEAR = 3;
        LINEAR_MIPMAP_NEAREST = 4;
        LINEAR_MIPMAP_LINEAR = 5;
    };

    enum WrapMode
    {
        REPEAT = 0;
        CLAMP = 1;
        MIRROR = 2;
        CLAMP_TO_EDGE = 3;
    };

    FilterMode minFilter = 1;
    FilterMode magFilter = 2;
    WrapMode wrapS = 4;
    WrapMode wrapT = 5;
    float anisotropy = 7;
    float minLOD = 8;
    float maxLOD = 9;
    float lodBias = 10;
};

// ==================== 纹理消息 ====================
message TextureMessage
{
    bytes imageData = 1;
};