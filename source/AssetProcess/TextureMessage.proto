syntax = "proto3";
import "Common.proto";

//采样器
message SamplerMessage
{

};

// 纹理的类型
enum TextureType 
{
    Default = 0;
    Normal = 1;
};

//纹理的message
message TextureMessage
{
    CompressType compressType = 1;
    TextureType textureType = 2;
    SamplerMessage sampler = 3;
    bytes imageData = 4;
};